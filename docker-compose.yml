version: '3'
services:
 mongo:
  image: mongo
  ports:
  - 27017:27017
  environment: 
  - MONGO_INITDB_ROOT_USERNAME=admin
  - MONGO_INITDB_ROOT_PASSWORD=adminadmin
 mongo-express:
  image: mongo-express
  ports:
  - 8081:8081
  restart: always
  environment:
  - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
  - ME_CONFIG_MONGODB_ADMINPASSWORD=adminadmin
  - ME_CONFIG_MONGODB_SERVER=mongo

 myimag:
  build: .
  image: 612356096472.dkr.ecr.us-east-1.amazonaws.com/my-app:1.1
  ports:
  - 3000:3000
  depends_on:
      - mongo
   
  